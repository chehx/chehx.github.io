<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>博客 - Haoxuan Che</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="blog.css">
</head>
<body class="blog-body">
  <header class="blog-header">
    <div class="blog-header-row">
      <a href="../index.html" class="blog-home" id="link-back-home"><i class="fa-solid fa-arrow-left"></i> <span id="text-back-home">返回首页</span></a>
      <nav class="blog-lang-switch" aria-label="Language">
        <button type="button" class="blog-lang-btn active" data-lang="zh" id="btn-lang-zh">中文</button>
        <span class="blog-lang-sep">|</span>
        <button type="button" class="blog-lang-btn" data-lang="en" id="btn-lang-en">English</button>
      </nav>
    </div>
    <h1 class="blog-title" id="text-blog-title">博客</h1>
  </header>

  <main class="blog-main">
    <div id="blog-list" class="blog-list">
      <p class="blog-loading" id="text-loading">加载中…</p>
    </div>
    <article id="blog-post" class="blog-post hidden">
      <div class="blog-post-toolbar">
        <a href="index.html" id="post-back-link" class="blog-post-back"><i class="fa-solid fa-arrow-left"></i> <span id="text-back-list">返回列表</span></a>
        <nav class="blog-lang-switch blog-lang-switch-inline" aria-label="Language">
          <button type="button" class="blog-lang-btn" data-lang="zh" id="btn-lang-zh-post">中文</button>
          <span class="blog-lang-sep">|</span>
          <button type="button" class="blog-lang-btn" data-lang="en" id="btn-lang-en-post">English</button>
        </nav>
      </div>
      <header class="blog-post-header">
        <h2 id="post-title"></h2>
        <time id="post-date" class="blog-post-date"></time>
      </header>
      <div id="post-content" class="blog-post-content markdown-body"></div>
      <section class="blog-comments" id="blog-comments" aria-label="Comments">
        <h3 class="blog-comments-title" id="text-comments-title">留言</h3>
        <p class="blog-comments-cta" id="text-comments-cta"></p>
        <a href="https://github.com/chehx/chehx.github.io/issues" target="_blank" rel="noopener" class="blog-comments-btn" id="blog-comments-link">
          <i class="fa-brands fa-github"></i> <span id="text-comments-btn">前往 GitHub Issues 留言</span>
        </a>
      </section>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function () {
      var LANG_KEY = 'blog-lang';
      var UI = {
        zh: {
          backHome: '返回首页',
          blogTitle: '博客',
          backList: '返回列表',
          loading: '加载中…',
          empty: '暂无文章。',
          loadError: '无法加载文章列表。',
          postNotFound: '未找到文章',
          postLoadError: '文章不存在或无法加载。',
          commentsTitle: '留言',
          commentsCta: '欢迎在 GitHub Issues 参与讨论、留言。',
          commentsBtn: '前往 GitHub Issues 留言'
        },
        en: {
          backHome: 'Back to Home',
          blogTitle: 'Blog',
          backList: 'Back to List',
          loading: 'Loading…',
          empty: 'No posts yet.',
          loadError: 'Could not load post list.',
          postNotFound: 'Post not found',
          postLoadError: 'Post does not exist or could not be loaded.',
          commentsTitle: 'Comments',
          commentsCta: 'You can comment or discuss on GitHub Issues.',
          commentsBtn: 'Comment via GitHub Issues'
        }
      };

      function getLang() {
        var stored = localStorage.getItem(LANG_KEY);
        return stored === 'en' || stored === 'zh' ? stored : 'zh';
      }
      function setLang(lang) {
        localStorage.setItem(LANG_KEY, lang);
      }

      function getPostTitle(post, lang) {
        if (lang === 'en' && post.title_en) return post.title_en;
        if (lang === 'zh' && post.title_zh) return post.title_zh;
        if (post.title) return post.title;
        return post.title_zh || post.title_en || post.slug;
      }

      var listEl = document.getElementById('blog-list');
      var postEl = document.getElementById('blog-post');
      var postTitle = document.getElementById('post-title');
      var postDate = document.getElementById('post-date');
      var postContent = document.getElementById('post-content');

      function applyUILang(lang) {
        var t = UI[lang] || UI.zh;
        var el = document.getElementById('text-back-home'); if (el) el.textContent = t.backHome;
        el = document.getElementById('text-blog-title'); if (el) el.textContent = t.blogTitle;
        el = document.getElementById('text-back-list'); if (el) el.textContent = t.backList;
        el = document.getElementById('text-loading'); if (el) el.textContent = t.loading;
        el = document.getElementById('text-comments-title'); if (el) el.textContent = t.commentsTitle;
        el = document.getElementById('text-comments-cta'); if (el) el.textContent = t.commentsCta || '';
        el = document.getElementById('text-comments-btn'); if (el) el.textContent = t.commentsBtn || '';
        document.querySelectorAll('.blog-lang-btn').forEach(function (btn) {
          btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
        });
      }

      function switchLang(lang) {
        setLang(lang);
        applyUILang(lang);
        var slug = (window.location.hash || '').replace(/^#/, '');
        if (slug && window.__blogPosts) {
          loadPost(slug, window.__blogPosts, lang);
        } else {
          renderList(window.__blogPosts || [], lang);
        }
      }

      function showList() {
        listEl.classList.remove('hidden');
        postEl.classList.add('hidden');
      }
      function showPost() {
        listEl.classList.add('hidden');
        postEl.classList.remove('hidden');
      }

      function renderList(posts, lang) {
        var t = UI[lang] || UI.zh;
        if (!posts || posts.length === 0) {
          listEl.innerHTML = '<p class="blog-empty">' + t.empty + '</p>';
          return;
        }
        posts.sort(function (a, b) { return b.date.localeCompare(a.date); });
        listEl.innerHTML = '<ul class="blog-ul">' + posts.map(function (p) {
          var title = getPostTitle(p, lang);
          return '<li><a href="index.html#' + p.slug + '">' + escapeHtml(title) + '</a> <span class="blog-item-date">' + p.date + '</span></li>';
        }).join('') + '</ul>';
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function renderMarkdown(md) {
        if (typeof marked !== 'undefined') {
          marked.setOptions({ gfm: true });
          return marked.parse(md || '');
        }
        return '<pre>' + escapeHtml(md || '') + '</pre>';
      }

      function loadPost(slug, posts, lang) {
        var meta = posts && posts.find(function (p) { return p.slug === slug; });
        if (meta) {
          postTitle.textContent = getPostTitle(meta, lang);
          postDate.textContent = meta.date;
          postDate.setAttribute('datetime', meta.date);
        }
        var t = UI[lang] || UI.zh;
        var other = lang === 'zh' ? 'en' : 'zh';
        var urls = ['posts/' + slug + '.' + lang + '.md', 'posts/' + slug + '.' + other + '.md', 'posts/' + slug + '.md'];
        function tryNext(i) {
          if (i >= urls.length) {
            postTitle.textContent = t.postNotFound;
            postContent.innerHTML = '<p>' + t.postLoadError + '</p>';
            showPost();
            return;
          }
          fetch(urls[i])
            .then(function (r) { return r.ok ? r.text() : Promise.reject(); })
            .then(function (md) {
              postContent.innerHTML = renderMarkdown(md);
              showPost();
            })
            .catch(function () { tryNext(i + 1); });
        }
        tryNext(0);
      }

      function onHashChange() {
        var slug = (window.location.hash || '').replace(/^#/, '');
        var lang = getLang();
        if (slug && window.__blogPosts) {
          loadPost(slug, window.__blogPosts, lang);
        } else {
          renderList(window.__blogPosts || [], lang);
          showList();
        }
      }

      applyUILang(getLang());

      document.getElementById('btn-lang-zh').addEventListener('click', function () { switchLang('zh'); });
      document.getElementById('btn-lang-en').addEventListener('click', function () { switchLang('en'); });
      document.getElementById('btn-lang-zh-post').addEventListener('click', function () { switchLang('zh'); });
      document.getElementById('btn-lang-en-post').addEventListener('click', function () { switchLang('en'); });

      if (window.location.protocol === 'file:') {
        var lang = getLang();
        listEl.innerHTML = '<p class="blog-empty blog-local-hint">' +
          (lang === 'zh' ? '当前通过 file:// 打开，无法加载文章列表。请在本项目根目录运行：<code>python3 -m http.server 8000</code>，然后访问 <a href="http://localhost:8000/blog/">http://localhost:8000/blog/</a>' :
            'Opened via file:// — post list cannot load. Run in project root: <code>python3 -m http.server 8000</code>, then open <a href="http://localhost:8000/blog/">http://localhost:8000/blog/</a>') +
          '</p>';
      } else {
        fetch('index.json')
          .then(function (r) { return r.json(); })
          .then(function (posts) {
            window.__blogPosts = posts;
            var lang = getLang();
            listEl.querySelector('.blog-loading') && listEl.querySelector('.blog-loading').remove();
            if (listEl.querySelector('.blog-ul')) listEl.querySelector('.blog-ul').remove();
            renderList(posts, lang);
            onHashChange();
          })
          .catch(function () {
            var t = UI[getLang()] || UI.zh;
            listEl.innerHTML = '<p class="blog-empty">' + t.loadError + '</p>';
          });
      }

      window.addEventListener('hashchange', onHashChange);
    })();
  </script>
</body>
</html>
